<!DOCTYPE html> 
<html lang="es"> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Título</title> 
        <link rel="stylesheet" href="script.css">
    </head> 
    <body> 
    <script src="script.js"></script> 

   <form method="get">
    <ul>
        <li>
            <label for="nombreCompleto" > Nombre: </label>
            <input type="text" id="nombreCompleto" name="nombreCompleto"   placeholder="Ingrese su nombre completo"
                minlength="5"
                maxlength="50"/>
        </li>

         <li>
            <label for="edad" > Edad: </label>
            <input type="number" id="edad" name="edad" min="0" max="120" placeholder="Ingrese su edad"/>
        </li>

         <li>
            <label for="tipoDoc" > Tipo de Documento: </label>
            <select name="tipoDoc" >
                 <option value="" disabled selected>
                    Seleccione una opción
                </option>

                <option value="RC">Registro Civil</option>
                <option value="TI">TI</option>
                <option value="CC">CC</option>
                <option value="CE">CE</option>  
                <option value="PP">PP</option>  
            </select>
        </li>

         <li>
            <label for="numeroDoc" > Numero de Documento: </label>
            <input type="number" id="numeroDoc" name="numeroDoc" placeholder="Ingrese su número de documento"
                minlength="5"
                maxlength="15"/>
        </li>
    </ul>
   </form>
</body> 
</html>
